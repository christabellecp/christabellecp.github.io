<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- background -->
    <radialGradient id="bg-glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#257D7C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#171410" stop-opacity="0"/>
    </radialGradient>

    <!-- step glow effects -->
    <filter id="glow-teal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#257D7C" opacity="0.7"/>
    </marker>
    <marker id="arrow-loop" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#CB6A3D" opacity="0.8"/>
    </marker>
  </defs>

  <!-- PAGE BACKGROUND -->
  <rect width="1200" height="480" fill="#171410"/>
  <rect width="1200" height="480" fill="url(#bg-glow)"/>

  <!-- subtle grid lines -->
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#2D2820" stroke-width="1" stroke-dasharray="4,8"/>
  <line x1="600" y1="0" x2="600" y2="480" stroke="#2D2820" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- EYEBROW -->
  <line x1="60" y1="56" x2="88" y2="56" stroke="#257D7C" stroke-width="1.5" opacity="0.8"/>
  <text x="100" y="60" fill="#9F9683" font-family="ui-monospace,monospace" font-size="11" letter-spacing="2">PRODUCTION LLM EVALUATION FRAMEWORK · HEALTHCARE AI</text>

  <!-- PIPELINE LOOP LINE (bottom) -->
  <!-- Forward arrows between steps -->
  <!-- Step 1 → 2 -->
  <line x1="278" y1="240" x2="338" y2="240" stroke="#257D7C" stroke-width="1.5" stroke-dasharray="none" marker-end="url(#arrow)" opacity="0.7"/>
  <!-- Step 2 → 3 -->
  <line x1="498" y1="240" x2="558" y2="240" stroke="#257D7C" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <!-- Step 3 → 4 -->
  <line x1="718" y1="240" x2="778" y2="240" stroke="#257D7C" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <!-- Step 4 → end -->
  <line x1="938" y1="240" x2="1000" y2="240" stroke="#257D7C" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- LOOP BACK ARC -->
  <path d="M 1060 300 L 1060 390 L 120 390 L 120 300"
        stroke="#CB6A3D" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.65"/>
  <text x="580" y="416" text-anchor="middle" fill="#CB6A3D"
        font-family="ui-monospace,monospace" font-size="10" letter-spacing="2" opacity="0.8">RE-EVALUATE ON THE GOLDEN SET · CONTINUOUS LOOP</text>
  <!-- loop arrow at start -->
  <path d="M 120 300 L 108 300" stroke="#CB6A3D" stroke-width="1.5" marker-end="url(#arrow-loop)" opacity="0.65"/>

  <!-- ══════════════════════════════════════════════ -->
  <!-- STEP 01: GOLDEN DATASET CURATION -->
  <!-- ══════════════════════════════════════════════ -->
  <g transform="translate(60, 140)">
    <!-- card -->
    <rect width="218" height="200" rx="6" fill="#1E1A14" stroke="#257D7C" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- teal top bar -->
    <rect width="218" height="4" rx="2" fill="#257D7C"/>
    <!-- number badge -->
    <rect x="16" y="20" width="28" height="20" rx="10" fill="#257D7C" fill-opacity="0.18" stroke="#257D7C" stroke-width="1" stroke-opacity="0.6"/>
    <text x="30" y="34" text-anchor="middle" fill="#257D7C" font-family="ui-monospace,monospace" font-size="11" font-weight="500">01</text>
    <!-- label -->
    <text x="52" y="34" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10" letter-spacing="1.5">CURATE</text>
    <!-- title -->
    <text x="16" y="68" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="500">Golden Dataset</text>
    <text x="16" y="88" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="500">Curation</text>
    <!-- desc -->
    <text x="16" y="116" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10.5" letter-spacing="0.3">Coverage-aware sampling</text>
    <text x="16" y="132" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10.5" letter-spacing="0.3">across conditions,</text>
    <text x="16" y="148" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10.5" letter-spacing="0.3">demographics, rare cases.</text>
    <!-- tags -->
    <rect x="16" y="164" width="46" height="18" rx="9" fill="#257D7C" fill-opacity="0.15" stroke="#257D7C" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="39" y="176" text-anchor="middle" fill="#257D7C" font-family="ui-monospace,monospace" font-size="9" letter-spacing="0.5">HUMAN</text>
    <rect x="70" y="164" width="38" height="18" rx="9" fill="#2C6E49" fill-opacity="0.2" stroke="#2C6E49" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="89" y="176" text-anchor="middle" fill="#8FCB95" font-family="ui-monospace,monospace" font-size="9" letter-spacing="0.5">AUTO</text>
  </g>

  <!-- ══════════════════════════════════════════════ -->
  <!-- STEP 02: LLM INFERENCE -->
  <!-- ══════════════════════════════════════════════ -->
  <g transform="translate(280, 140)">
    <rect width="218" height="200" rx="6" fill="#1E1A14" stroke="#257D7C" stroke-width="1" stroke-opacity="0.3"/>
    <rect width="218" height="4" rx="2" fill="#2C6E49"/>
    <rect x="16" y="20" width="28" height="20" rx="10" fill="#257D7C" fill-opacity="0.12" stroke="#257D7C" stroke-width="1" stroke-opacity="0.4"/>
    <text x="30" y="34" text-anchor="middle" fill="#257D7C" font-family="ui-monospace,monospace" font-size="11" font-weight="500">02</text>
    <text x="52" y="34" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10" letter-spacing="1.5">GENERATE</text>
    <text x="16" y="68" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="500">Model Output</text>
    <text x="16" y="88" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="500">Generation</text>
    <text x="16" y="116" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10.5" letter-spacing="0.3">LLM generates outputs</text>
    <text x="16" y="132" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10.5" letter-spacing="0.3">against the golden set.</text>
    <text x="16" y="148" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10.5" letter-spacing="0.3">Logs per-prediction conf.</text>
    <rect x="16" y="164" width="28" height="18" rx="9" fill="#2C6E49" fill-opacity="0.2" stroke="#2C6E49" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="30" y="176" text-anchor="middle" fill="#8FCB95" font-family="ui-monospace,monospace" font-size="9" letter-spacing="0.5">AI</text>
  </g>

  <!-- ══════════════════════════════════════════════ -->
  <!-- STEP 03: LLM-AS-JUDGE + HUMAN EVAL -->
  <!-- ══════════════════════════════════════════════ -->
  <g transform="translate(500, 100)">
    <rect width="218" height="280" rx="6" fill="#1A2020" stroke="#257D7C" stroke-width="2" stroke-opacity="0.9"/>
    <rect width="218" height="4" rx="2" fill="#257D7C"/>
    <!-- active indicator -->
    <circle cx="198" cy="24" r="5" fill="#257D7C" opacity="0.9"/>
    <circle cx="198" cy="24" r="8" fill="#257D7C" opacity="0.2"/>
    <rect x="16" y="18" width="28" height="20" rx="10" fill="#257D7C" fill-opacity="0.25" stroke="#257D7C" stroke-width="1.5" stroke-opacity="0.8"/>
    <text x="30" y="32" text-anchor="middle" fill="#257D7C" font-family="ui-monospace,monospace" font-size="11" font-weight="500">03</text>
    <text x="52" y="32" fill="#257D7C" font-family="ui-monospace,monospace" font-size="10" letter-spacing="1.5">EVALUATE</text>
    <text x="16" y="64" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="500">Scoring &amp;</text>
    <text x="16" y="84" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="500">Human Validation</text>
    <!-- sub-card: LLM judge -->
    <rect x="12" y="100" width="194" height="72" rx="4" fill="#1E2A28" stroke="#257D7C" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="24" y="118" fill="#4DD4B5" font-family="ui-monospace,monospace" font-size="9.5" letter-spacing="1">LLM-AS-JUDGE</text>
    <text x="24" y="136" fill="#CDC1A9" font-family="ui-monospace,monospace" font-size="10" letter-spacing="0.3">Automated rubric scoring.</text>
    <text x="24" y="152" fill="#CDC1A9" font-family="ui-monospace,monospace" font-size="10" letter-spacing="0.3">Catches regressions early.</text>
    <!-- sub-card: human -->
    <rect x="12" y="182" width="194" height="72" rx="4" fill="#251E14" stroke="#CB6A3D" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="24" y="200" fill="#CB6A3D" font-family="ui-monospace,monospace" font-size="9.5" letter-spacing="1">HUMAN-IN-THE-LOOP</text>
    <text x="24" y="218" fill="#CDC1A9" font-family="ui-monospace,monospace" font-size="10" letter-spacing="0.3">High-uncertainty cases route</text>
    <text x="24" y="234" fill="#CDC1A9" font-family="ui-monospace,monospace" font-size="10" letter-spacing="0.3">to clinical reviewers.</text>
    <!-- metrics row -->
    <text x="16" y="264" fill="#9F9683" font-family="ui-monospace,monospace" font-size="9" letter-spacing="1">PRECISION · RECALL · HALLUCINATION</text>
  </g>

  <!-- ══════════════════════════════════════════════ -->
  <!-- STEP 04: PROMPT OPTIMIZATION -->
  <!-- ══════════════════════════════════════════════ -->
  <g transform="translate(720, 140)">
    <rect width="218" height="200" rx="6" fill="#1E1A14" stroke="#CB6A3D" stroke-width="1" stroke-opacity="0.4"/>
    <rect width="218" height="4" rx="2" fill="#CB6A3D"/>
    <rect x="16" y="20" width="28" height="20" rx="10" fill="#CB6A3D" fill-opacity="0.12" stroke="#CB6A3D" stroke-width="1" stroke-opacity="0.4"/>
    <text x="30" y="34" text-anchor="middle" fill="#CB6A3D" font-family="ui-monospace,monospace" font-size="11" font-weight="500">04</text>
    <text x="52" y="34" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10" letter-spacing="1.5">OPTIMIZE</text>
    <text x="16" y="68" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="500">Autonomous</text>
    <text x="16" y="88" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="500">Prompt Tuning</text>
    <text x="16" y="116" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10.5" letter-spacing="0.3">Structured search over</text>
    <text x="16" y="132" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10.5" letter-spacing="0.3">prompt templates against</text>
    <text x="16" y="148" fill="#9F9683" font-family="ui-monospace,monospace" font-size="10.5" letter-spacing="0.3">the fixed golden set.</text>
    <rect x="16" y="164" width="28" height="18" rx="9" fill="#CB6A3D" fill-opacity="0.15" stroke="#CB6A3D" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="30" y="176" text-anchor="middle" fill="#CB6A3D" font-family="ui-monospace,monospace" font-size="9" letter-spacing="0.5">AI</text>
  </g>

  <!-- DEPLOY label -->
  <g transform="translate(1000, 180)">
    <rect width="100" height="120" rx="6" fill="#1E1A14" stroke="#8FCB95" stroke-width="1" stroke-opacity="0.5"/>
    <rect width="100" height="4" rx="2" fill="#8FCB95"/>
    <text x="50" y="52" text-anchor="middle" fill="#8FCB95" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="500">Deploy</text>
    <text x="50" y="72" text-anchor="middle" fill="#8FCB95" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="500">to Prod</text>
    <circle cx="50" cy="100" r="6" fill="#8FCB95" opacity="0.3"/>
    <circle cx="50" cy="100" r="3" fill="#8FCB95" opacity="0.9"/>
  </g>
</svg>
