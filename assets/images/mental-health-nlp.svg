    <text x="406" y="16" fill="#8FCB95" font-family="ui-monospace,monospace" font-size="9" letter-spacing="0.8">MILESTONE · WK 5</text>
    <text x="406" y="32" fill="#CDC1A9" font-family="'Space Grotesk',sans-serif" font-size="11">4 / 7 days achieved ✓</text>
    <text x="406" y="46" fill="#8FCB95" font-family="ui-monospace,monospace" font-size="9">improving · on track</text>
  </g>

  <!-- CAPTION -->
  <line x1="48" y1="778" x2="76" y2="778" stroke="#6B6158" stroke-width="1" opacity="0.5"/>
  <text x="88" y="782" fill="#6B6158"
