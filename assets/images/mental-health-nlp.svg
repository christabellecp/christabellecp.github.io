  <text x="104" y="391" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="12">My goal was to sleep before midnight.</text>
  <text x="104" y="407" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="12">I managed it 4 out of 7 days —</text>
  <text x="104" y="421" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="12">better than last week!</text>
  <!-- highlight "goal" -->
  <rect x="110" y="381" width="31" height="14" rx="2" fill="#9C8DDB" fill-opacity="0.22" stroke="#9C8DDB" stroke-width="0.8" stroke-opacity="0.5"/>
