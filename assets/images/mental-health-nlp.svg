    <text x="142" y="35" fill="#6B6158" font-family="ui-monospace,monospace" font-size="9">3 sessions · 30min avg</text>

    <text x="0" y="56" fill="#6B6158" font-family="ui-monospace,monospace" font-size="9">WK 5</text>
    <rect x="36" y="46" width="100" height="14" rx="3" fill="#8FCB95" fill-opacity="0.25"/>
