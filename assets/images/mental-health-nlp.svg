  <text x="104" y="213" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="12">I've been feeling really anxious lately,</text>
  <text x="104" y="228" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="12">especially in the mornings.</text>
  <!-- highlight on "anxious" -->
  <rect x="237" y="203" width="55" height="14" rx="2" fill="#257D7C" fill-opacity="0.25" stroke="#257D7C" stroke-width="0.8" stroke-opacity="0.6"/>

  <!-- Session label week 3 -->
  <text x="58" y="256" fill="#6B6158"
        font-family="ui-monospace,monospace" font-size="9" letter-spacing="1.5">SESSION · WEEK 3</text>
  <line x1="58" y1="260" x2="418" y2="260" stroke="#2D2820" stroke-width="0.8"/>

  <!-- Member bubble 2 — activity signal -->
  <rect x="90" y="268" width="320" height="54" rx="6" fill="#1E2A28" stroke="#257D7C" stroke-width="1" stroke-opacity="0.6"/>
