  <rect x="720" y="60" width="732" height="28" rx="4" fill="#182018" stroke="#8FCB95" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="1086" y="78" text-anchor="middle" fill="#8FCB95"
