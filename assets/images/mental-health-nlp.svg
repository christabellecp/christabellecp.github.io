  <text x="72" y="163" fill="#CDC1A9" font-family="'Space Grotesk',sans-serif" font-size="12">How have you been feeling this week?</text>

  <!-- Member bubble 1 — anxiety signal -->
  <rect x="90" y="180" width="320" height="54" rx="6" fill="#1E2A28" stroke="#257D7C" stroke-width="1" stroke-opacity="0.6"/>
