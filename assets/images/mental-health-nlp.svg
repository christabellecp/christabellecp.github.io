  <text x="104" y="301" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="12">I went for a 30-minute walk yesterday,</text>
  <text x="104" y="316" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="12">first time this week.</text>
  <!-- highlight on "30-minute walk" -->
  <rect x="131" y="291" width="108" height="14" rx="2" fill="#8FCB95" fill-opacity="0.18" stroke="#8FCB95" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Session label week 5 -->
  <text x="58" y="346" fill="#6B6158"
        font-family="ui-monospace,monospace" font-size="9" letter-spacing="1.5">SESSION · WEEK 5</text>
  <line x1="58" y1="350" x2="418" y2="350" stroke="#2D2820" stroke-width="0.8"/>

  <!-- Member bubble 3 — goal signal -->
