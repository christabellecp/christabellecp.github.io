    <text x="208" y="46" fill="#6B6158" font-family="ui-monospace,monospace" font-size="9">partial · struggling</text>

    <text x="378" y="30" fill="#6B6158" font-family="ui-monospace,monospace" font-size="14">→</text>

    <!-- Updated -->
