  <rect x="464" y="60" width="220" height="28" rx="4" fill="#1E1820" stroke="#9C8DDB" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="574" y="78" text-anchor="middle" fill="#9C8DDB"
