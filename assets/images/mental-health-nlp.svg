    <text x="454" y="16" fill="#6B6158" font-family="ui-monospace,monospace" font-size="9" letter-spacing="0.8">EXTRACTED MENTION</text>
    <text x="454" y="34" fill="#F6F1E8" font-family="'Space Grotesk',sans-serif" font-size="11">"30-minute walk yesterday"</text>
    <text x="454" y="52" fill="#8FCB95" font-family="ui-monospace,monospace" font-size="9">duration: 30min · type: walk · recency: 1d</text>
  </g>

  <!-- ── OUTPUT 3: Goal Progress ── -->
  <rect x="720" y="630" width="740" height="140" rx="8" fill="#1E1A28" stroke="#9C8DDB" stroke-width="1.5"/>
