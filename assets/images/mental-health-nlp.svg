    <text x="10" y="188" fill="#6B6158" font-family="ui-monospace,monospace" font-size="9">+ longitudinal alignment</text>

    <!-- arrow -->
    <line x1="98" y1="196" x2="98" y2="212" stroke="#9C8DDB" stroke-width="1.2" marker-end="url(#arr-lav)"/>

